<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LofiCave • LLM Stations</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="anime-bg"></div>
    <iframe id="youtube-player" frameborder="0" allowfullscreen></iframe>

    <!-- TAP TO START -->
    <div id="start-overlay">
        <div class="start-content">
            <h1>TAP TO START</h1>
            <p>Japanese anime lofi • LLM stations 🎧</p>
            <p class="hint">what is Grok listening to right now?</p>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="channel-name"></div>
        <div id="change-btn">next station →</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
